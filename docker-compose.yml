services:
  site:
    build:
      context: ./site
    depends_on:
      - runner
      - tracker

  runner:
    build:
      context: .            # repo root — needed to COPY projects/
      dockerfile: runner/Dockerfile
    expose:
      - "8000"

  tracker:
    build:
      context: ./tracker
    expose:
      - "8001"
    volumes:
      - tracker_data:/data

volumes:
  tracker_data:
